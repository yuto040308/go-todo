# oapi-codegen の設定ファイル
# 実行: docker compose exec backend go tool oapi-codegen -config oapi-codegen.cfg.yaml /api/openapi.yaml

# 生成 Go コードのパッケージ名
package: api

# 出力ファイルパス (backend/ からの相対)
output: gen/api/api.gen.go

# 何を生成するか
generate:
  models: true          # 型 (struct) を生成
  gin-server: true      # Gin 用 ServerInterface を生成
  embedded-spec: true   # spec を Go に埋め込む → GetSwagger() でリクエスト検証 middleware に渡す
