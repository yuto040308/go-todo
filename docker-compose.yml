services:
  # nginx
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    # 起動順序をこれらより後に設定
    depends_on:
      - backend
      - frontend

  # postgres
  postgres:
    image: postgres:18.4-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=go_todo
    volumes:
      - postgres_data:/var/lib/postgresql

  # frontend(Next.js)
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # node_modulesはコンテナ内で管理するため、ホストのnode_modulesは除外
      - /app/node_modules
      - /app/.next
      - ./api:/api

  # Backend(Go + Gin)
  backend:
    build:
      context: ./backend
      target: dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./api:/api
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgres://app:password@postgres:5432/go_todo?sslmode=disable

  # Migrate（インスタント起動。常駐しない）
  migrate:
    # golang-migrateのイメージ
    image: migrate/migrate:v4.19.1
    volumes:
      - ./backend/migrations:/migrations
    entrypoint:
      - migrate
      - -path
      - /migrations
      - -database
      - postgres://app:password@postgres:5432/go_todo?sslmode=disable
    depends_on:
      - postgres
    profiles:
      # docker compose upに含まない
      - tools

volumes:
  postgres_data: