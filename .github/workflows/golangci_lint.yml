name: GolangCI Auto-Review

on: [pull_request]

jobs:
  golangci-lint-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read        # コードを読む権限
      pull-requests: write  # PRにコメントするための書き込み権限

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s -- -b $(go env GOPATH)/bin v2.11.4

      # まず --fix を実行して、CI上のファイルを「自動修正」します。
      # (|| true をつけるのは、修正箇所があってもエラーで止めないため)
      - name: Run golangci-lint --fix
        working-directory: ./backend
        run: golangci-lint run --fix ./... || true

      # Reviewdogが「変更されたファイル」を検知して、
      # 「提案コメント」(Commit suggestionボタン付き)としてPRに書き込みます。
      - name: Suggest changes (Reviewdog)
        uses: reviewdog/action-suggester@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tool_name: golangci-lint

      # 最後に --fix なしで実行し、修正しきれていないエラーがあればCIを失敗させます。
      - name: Check for remaining violations
        working-directory: ./backend
        run: golangci-lint run ./...